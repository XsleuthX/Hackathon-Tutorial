    color: var(--ink);

    text-rendering: optimizeLegibility;
    scroll-behavior: smooth;
  }
  body {

      radial-gradient(circle at 92% 14%, rgba(234,88,12,0.05), transparent 30%),

  }

    content: "";

    z-index: 1;

  }

    background-size: 24px 24px;
  }

  .display-tight { letter-spacing: -0.035em; }
  .serif-it { font-family: 'Instrument Serif', serif; font-style: italic; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-stagger > * { opacity: 0; transform: translateY(14px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal-stagger.in > * { opacity: 1; transform: translateY(0); }
  .reveal-stagger.in > *:nth-child(1) { transition-delay: .04s; }
  .reveal-stagger.in > *:nth-child(2) { transition-delay: .12s; }
  .reveal-stagger.in > *:nth-child(3) { transition-delay: .20s; }
  .reveal-stagger.in > *:nth-child(4) { transition-delay: .28s; }
  .reveal-stagger.in > *:nth-child(5) { transition-delay: .36s; }
  .reveal-stagger.in > *:nth-child(6) { transition-delay: .44s; }
  .reveal-stagger.in > *:nth-child(7) { transition-delay: .52s; }
  .reveal-stagger.in > *:nth-child(8) { transition-delay: .60s; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .55rem 1rem;
    border: 1px solid rgba(14,14,16,0.18);
    background: white;
    border-radius: 999px;
    font-size: 0.86rem;
    transition: all .2s ease;
  }
  .btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .btn-ink {
    background: var(--ink); color: white; border-color: var(--ink);
  }
  .btn-ink:hover { background: #2a2a30; }

  /* Tag chips */
  .chip {
    display: inline-flex; align-items: center; gap: .35rem;
    padding: 4px 10px; border-radius: 999px;
    font-size: 0.72rem; letter-spacing: .04em; text-transform: uppercase;
    font-weight: 500;
  }

  /* Card surface */
  .surface {
    background: white;
    border: 1px solid rgba(14,14,16,0.08);
    border-radius: 18px;
    box-shadow: 0 1px 0 rgba(14,14,16,0.02), 0 12px 32px -20px rgba(14,14,16,0.18);
  }
  .surface-flat {
    background: white;
    border: 1px solid rgba(14,14,16,0.08);
    border-radius: 14px;
  }

  /* Marquee */
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 50s linear infinite; }

  /* Float blob */
  @keyframes floaty {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(12px,-18px) rotate(2deg); }
  }
  .floaty { animation: floaty 9s ease-in-out infinite; }
  .floaty-slow { animation: floaty 14s ease-in-out infinite; }

  /* Dashed connector */
  .conn-dash {
    background-image: linear-gradient(to right, rgba(14,14,16,0.4) 50%, transparent 0%);
    background-size: 8px 1px;
    background-repeat: repeat-x;
    background-position: 0 center;
    height: 1px;
  }

  /* Flow packet */
  @keyframes packetFlow {
    0% { left: 0%; opacity: 0; }
    8% { opacity: 1; }
    92% { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }
  .packet { animation: packetFlow 4.5s cubic-bezier(.55,.05,.45,.95) infinite; }

  /* Lang switch */
  .lang-pill {
    position: relative;
    display: inline-flex;
    background: rgba(14,14,16,0.06);
    border-radius: 999px;
    padding: 3px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .lang-pill button {
    position: relative; z-index: 2;
    padding: 5px 14px;
    border-radius: 999px;
    color: var(--dim);
    transition: color .25s ease;
    line-height: 1;
  }
  .lang-pill button.active { color: white; }
  .lang-pill .slider {
    position: absolute; top: 3px; bottom: 3px;
    width: calc(50% - 3px);
    background: var(--ink);
    border-radius: 999px;
    transition: transform .35s cubic-bezier(.4,.0,.2,1);
    z-index: 1;
  }

  /* Mock app */
  .mockup {
    background: #FBFAF6;
    border: 1px solid rgba(14,14,16,0.1);
    border-radius: 16px;
    box-shadow: 0 30px 80px -40px rgba(14,14,16,0.3);
    overflow: hidden;
  }
  .mock-zone {
    position: relative;
    transition: all .25s ease;
    cursor: pointer;
  }
  .mock-zone::after {
    content: "";
    position: absolute; inset: 0;
    border: 2px solid transparent;
    border-radius: inherit;
    pointer-events: none;
    transition: all .25s ease;
  }
  .mock-zone.active::after,
  .mock-zone:hover::after {
    border-color: var(--zone-c, #0E0E10);
    box-shadow: 0 0 0 4px rgba(14,14,16,0.05);
  }
  .mock-zone.active {
    background: var(--zone-bg, white);
  }

  /* Hero ticker */
  .ticker {
    overflow: hidden;
    border-top: 1px solid rgba(14,14,16,0.1);
    border-bottom: 1px solid rgba(14,14,16,0.1);
    background: #F3EFE3;
  }

  /* Prompt code box */
  .prompt-box {
    background: #16161A;
    color: #EDEDED;
    border-radius: 14px;
    padding: 22px 22px 18px;
    position: relative;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.7;
  }
  .prompt-box .accent { color: #FBBF24; }
  .prompt-box .kw { color: #93C5FD; }
  .prompt-box .num { color: #86EFAC; }

  /* Don't card hover state */
  .dont-card { transition: all .3s ease; cursor: pointer; }
  .dont-card:hover { transform: translateY(-3px); }
  .do-card { transition: all .3s ease; }

  /* Checklist tick */
  .tickbox {
    width: 22px; height: 22px;
    border: 1.5px solid rgba(14,14,16,0.3);
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .2s ease;
    flex-shrink: 0;
    background: white;
  }
  .tickbox.on {
    background: #16A34A;
    border-color: #16A34A;
    color: white;
  }
  .tickbox svg { width: 14px; height: 14px; opacity: 0; transition: opacity .15s ease; }
  .tickbox.on svg { opacity: 1; }

  /* Tabs */
  .tab-row {
    display: flex; gap: 6px;
    background: rgba(14,14,16,0.05);
    padding: 5px;
    border-radius: 12px;
  }
  .tab-row button {
    flex: 1;
    padding: 11px 16px;
    border-radius: 9px;
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--dim);
    transition: all .2s ease;
    text-align: center;
  }
  .tab-row button.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(14,14,16,0.06), 0 4px 14px -6px rgba(14,14,16,0.18);
  }

  .ulink {
    background-image: linear-gradient(to right, currentColor, currentColor);
    background-size: 100% 1px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    transition: background-size .3s;
  }
  .ulink:hover { background-size: 0% 1px; }

  /* Section divider rule */
  .rule {
    height: 1px; background: rgba(14,14,16,0.12);
  }

  /* Subtle scroll progress */
  #scroll-progress {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--ink);
    z-index: 60;
    transition: width .12s linear;
    width: 0;
  }

  /* Section number stamp */
  .stamp {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .stamp::before {
    content: ""; display: block; width: 24px; height: 1px; background: var(--ink);
  }

  /* Marker arrow */
  .arrow-svg { width: 18px; height: 12px; flex-shrink: 0; }

  /* When language is Chinese, prefer Chinese font for headings */
  body.lang-zh .display { font-family: 'Noto Sans SC', 'Bricolage Grotesque', sans-serif; font-weight: 700; letter-spacing: -0.025em; }
  body.lang-zh { font-family: 'Noto Sans SC', 'Geist', sans-serif; }

  @media (max-width: 768px) {
    .display-hero { font-size: clamp(2.6rem, 11vw, 4.5rem) !important; }
  }

  /* Custom scrollbar inside scrollable elements */
  .nice-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: rgba(14,14,16,0.2); border-radius: 999px; }

  /* Brand mark */
  .brand-mark {
    width: 28px; height: 28px;
    background: var(--ink);
    border-radius: 8px;
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute;
    inset: 7px; border-radius: 3px;
    background: linear-gradient(135deg, #16A34A, #2563EB);
  }

  /* Cursor-style blinking caret */
  @keyframes caret { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
  .caret { animation: caret 0.9s steps(1) infinite; }

  /* No tap highlights */
  * { -webkit-tap-highlight-color: transparent; }

  /* Avatar shape */
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 600; color: white; font-size: 0.75rem; letter-spacing: 0.04em;
    border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
</style>

// helper: pick zh/en from a {zh, en} object

// ===== Hooks =====
function useInView(opts = {}) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const ob = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        setInView(true);
        ob.disconnect();
      }
    }, { threshold: opts.threshold ?? 0.18, rootMargin: opts.rootMargin ?? "0px 0px -10% 0px" });
    ob.observe(el);
    return () => ob.disconnect();
  }, []);
  return [ref, inView];
}

function Reveal({ children, className = "", as: As = "div", stagger = false, ...rest }) {
  const [ref, inView] = useInView();
  return (
    <As ref={ref} className={(stagger ? "reveal-stagger " : "reveal ") + (inView ? "in " : "") + className} {...rest}>
      {children}
    </As>
  );
}

// ===== Scroll progress =====
function useScrollProgress() {
  useEffect(() => {
    const bar = document.getElementById("scroll-progress");
    const onScroll = () => {
      const h = document.documentElement;
      const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight);
      if (bar) bar.style.width = (scrolled * 100).toFixed(2) + "%";
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
}

function TeamSection({ lang, sharedZone, setSharedZone }) {
  const tm = DICT.team;
  const [activeMember, setActiveMember] = useState("ui-a");
  const member = tm.members.find(m => m.id === activeMember);

  // when active member changes, also reflect on shared zone (first owned)
  useEffect(() => {
    if (member && member.owns.length > 0) {
      setSharedZone(member.owns[0]);
    }
  }, [activeMember]);

  return (
    <section id="team" className="py-24 md:py-32">
      <div className="max-w-7xl mx-auto px-5 md:px-8">
        <Reveal>
          <div className="stamp mb-5">{pick(tm.eyebrow, lang)}</div>
          <h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(tm.title, lang)}</h2>
          <p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(tm.lede, lang)}</p>
        </Reveal>

        <Reveal className="mt-14 grid grid-cols-1 lg:grid-cols-5 gap-8">
          {/* Member list (left) */}
          <div className="lg:col-span-2 grid grid-cols-2 lg:grid-cols-1 gap-2">
            {tm.members.map((m) => {

              return (
                <button

                  className={"flex items-center gap-4 p-4 rounded-2xl border text-left transition " +

                  <div className="flex-1 min-w-0">

                      {m.owns.length === 6 ? (lang === "zh" ? "全流程" : "all zones") : m.owns.map(o => DICT.arch.zones.find(z=>z.key===o)?.id).join(" · ")}

                </button>
              );
            })}

            <div className="surface mt-5 p-6">

                  <span key={i} className="chip bg-cream text-ink/85 border border-ink/10">{d}</span>

        {/* Core principles + remember + goal */}
        <Reveal className="mt-20 grid grid-cols-1 md:grid-cols-3 gap-5">
          <div className="surface p-7 md:col-span-1">
            <div className="flex items-center gap-2 mb-4">
              <span className="text-2xl">⭐</span>
              <div className="display text-xl" style={{ color: "#16A34A" }}>{pick(s.core.title, lang)}</div>
            </div>
            <ul className="space-y-3">
              {pick(s.core.items, lang).map((it, i) => (
                <li key={i} className="flex items-start gap-2 text-sm text-ink/80 leading-relaxed">
                  <Icon.Check className="w-4 h-4 mt-0.5 flex-shrink-0" style={{ color: "#16A34A" }}/>
                  <span>{it}</span>
                </li>
              ))}
            </ul>
          </div>

          <div className="surface p-7 md:col-span-1" style={{ background: "#FEF3C7", border: "1px solid #F59E0B30" }}>
            <div className="flex items-center gap-2 mb-3">
              <span className="text-2xl">💡</span>
              <div className="display text-xl">{pick(s.remember.title, lang)}</div>
            </div>
            <p className="text-ink/85 leading-relaxed text-[15px]">{pick(s.remember.body, lang)}</p>
          </div>

          <div className="surface p-7 md:col-span-1" style={{ background: "#DCFCE7", border: "1px solid #16A34A30" }}>
            <div className="flex items-center gap-2 mb-3">
              <span className="text-2xl">🎯</span>
              <div className="display text-xl" style={{ color: "#16A34A" }}>{pick(s.goal.title, lang)}</div>
            </div>
            <p className="text-ink/85 leading-relaxed text-[15px]">{pick(s.goal.body, lang)}</p>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

// ===== PROMPTS (Section 7) =====
function PromptsSection({ lang }) {
  const p = DICT.prompts;
  const [tab, setTab] = useState(0);
  const [copied, setCopied] = useState(false);
  const cur = p.tabs[tab];

  const copySample = () => {
    const text = cur.sample[lang].join("\n");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      });
    } else {
      // fallback
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }
  };

  return (
    <section id="prompts" className="py-24 md:py-32">
      <div className="max-w-7xl mx-auto px-5 md:px-8">
        <Reveal>
          <div className="stamp mb-5">{pick(p.eyebrow, lang)}</div>
          <h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(p.title, lang)}</h2>
          <p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(p.lede, lang)}</p>
        </Reveal>

        {/* Tabs */}
        <Reveal className="mt-12">
          <div className="tab-row max-w-xl">
            {p.tabs.map((t, i) => (
              <button key={t.key} className={tab === i ? "active" : ""} onClick={() => { setTab(i); setCopied(false); }}
                      style={tab === i ? { color: t.color } : {}}>
                <span className="mono text-[10px] tracking-widest opacity-60 mr-1.5">0{i+1}</span>
                {pick(t.label, lang)}
              </button>
            ))}
          </div>
        </Reveal>

        <Reveal className="mt-8 grid grid-cols-1 lg:grid-cols-12 gap-6">
          {/* Left: intent + flow */}
          <div className="lg:col-span-5">
            <div className="surface p-7">
              <div className="display text-2xl mb-2 leading-tight" style={{ color: cur.color }}>{pick(cur.label, lang)}</div>
              <p className="text-ink/75 leading-relaxed">{pick(cur.intent, lang)}</p>

              <div className="mt-7">
                <div className="mono text-[10px] uppercase tracking-widest text-dim mb-3">{lang === "zh" ? "流程" : "Flow"}</div>
                <div className="space-y-2">
                  {cur.flow.map((f, i) => (
                    <Fragment key={i}>
                      <div className="flex items-center gap-3 p-3 rounded-xl border" style={{ background: cur.color + "08", borderColor: cur.color + "30" }}>
                        <div className="w-6 h-6 rounded-full flex items-center justify-center text-white display text-xs" style={{ background: cur.color }}>{i+1}</div>
                        <div className="text-sm font-medium">{pick(f, lang)}</div>
                      </div>
                      {i < cur.flow.length - 1 && (
                        <div className="flex justify-center"><Icon.Arrow className="w-3.5 h-2.5 text-dim" style={{ transform: "rotate(90deg)" }}/></div>
                      )}
                    </Fragment>
                  ))}
                </div>
              </div>

              <div className="mt-7 pt-5 border-t border-ink/8">
                <div className="mono text-[10px] uppercase tracking-widest text-dim mb-1">{pick(p.goalLabel, lang)}</div>
                <div className="text-sm text-ink/80 leading-relaxed">{pick(cur.goal, lang)}</div>
              </div>
            </div>
          </div>

          {/* Right: code */}
          <div className="lg:col-span-7">
            <div className="prompt-box relative">
              <div className="flex items-center justify-between mb-4">
                <div className="flex gap-1.5">
                  <div className="w-2.5 h-2.5 rounded-full bg-white/15"/>
                  <div className="w-2.5 h-2.5 rounded-full bg-white/15"/>
                  <div className="w-2.5 h-2.5 rounded-full bg-white/15"/>
                </div>
                <div className="mono text-[10px] tracking-widest text-white/40 uppercase">prompt · {cur.key}</div>
                <button onClick={copySample} className="flex items-center gap-1.5 text-xs px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-white transition">
                  {copied ? <Icon.Check className="w-3 h-3"/> : <Icon.Copy className="w-3 h-3"/>}
                  {copied ? pick(p.copied, lang) : pick(p.copy, lang)}
                </button>
              </div>
              <pre className="whitespace-pre-wrap text-[13px] leading-[1.75] font-mono">
                {cur.sample[lang].map((line, i) => {
                  // syntax highlighting hints
                  let cls = "";
                  if (/^\d+\./.test(line.trim())) cls = "num";
                  else if (line.trim().endsWith(":")) cls = "kw";
                  else if (line.includes("\"") || /["“”]/.test(line)) cls = "accent";
                  return <div key={i} className={cls}>{line || "\u00A0"}</div>;
                })}
              </pre>
            </div>
          </div>
        </Reveal>

        {/* Principles */}
        <Reveal className="mt-16">
          <div className="display text-2xl mb-5">{pick(p.principlesTitle, lang)}</div>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
            {p.principles.map((pr, i) => (
              <div key={i} className="surface-flat p-5">
                <div className="mono text-xs tracking-widest text-dim mb-2">0{i+1}</div>
                <div className="display text-lg mb-1">{pick(pr.title, lang)}</div>
                <div className="text-sm text-ink/65 leading-relaxed">{pick(pr.body, lang)}</div>
              </div>
            ))}
          </div>
        </Reveal>
      </div>
    </section>
  );
}

// ===== CLOSE =====
function CloseSection({ lang }) {
  const c = DICT.close;
  return (
    <section className="py-28 md:py-40 relative overflow-hidden border-t border-ink/10" style={{ background: "#0E0E10", color: "#FAF8F2" }}>
      <div className="absolute inset-0 dotgrid opacity-10"/>
      <div className="absolute -top-32 left-1/4 w-[500px] h-[500px] rounded-full floaty-slow"
           style={{ background: "radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%)" }}/>
      <div className="absolute -bottom-32 right-1/4 w-[500px] h-[500px] rounded-full floaty"
           style={{ background: "radial-gradient(circle, rgba(22,163,74,0.18), transparent 70%)" }}/>

      <div className="relative max-w-5xl mx-auto px-5 md:px-8 text-center">
        <Reveal>
          <div className="mono text-xs uppercase tracking-widest text-white/50 mb-7">{pick(c.eyebrow, lang)}</div>
        </Reveal>
        <Reveal>
          <h2 className="display text-4xl md:text-6xl leading-[1.05] max-w-4xl mx-auto">{pick(c.title, lang)}</h2>
        </Reveal>
        <Reveal>
          <p className="mt-7 text-lg md:text-xl text-white/65 max-w-2xl mx-auto leading-relaxed">{pick(c.body, lang)}</p>
        </Reveal>
        <Reveal>
          <div className="mt-12 flex items-center justify-center gap-3">
            <a href="#top" className="btn" style={{ background: "white", color: "#0E0E10", borderColor: "white" }}>
              ↑ {pick(c.back, lang)}
            </a>
          </div>
        </Reveal>
        <Reveal>
          <div className="mt-20 pt-8 border-t border-white/10 text-xs mono uppercase tracking-widest text-white/40">{pick(c.sign, lang)} · 2026</div>
        </Reveal>
      </div>
    </section>
  );
}

// ===== APP =====
function App() {
  const [lang, setLang] = useState("zh");
  const [sharedZone, setSharedZone] = useState("topnav");

  useScrollProgress();

  useEffect(() => {
    document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
    document.body.classList.toggle("lang-zh", lang === "zh");
    document.body.classList.toggle("lang-en", lang === "en");
  }, [lang]);

  return (
    <LangCtx.Provider value={{ lang }}>
      <div className="relative">
        <Nav lang={lang} setLang={setLang} />
        <main>
          <Hero lang={lang} />
          <DemoSection lang={lang} />
          <ArchSection lang={lang} sharedZone={sharedZone} setSharedZone={setSharedZone} />
          <TeamSection lang={lang} sharedZone={sharedZone} setSharedZone={setSharedZone} />
          <FlowSection lang={lang} />
          <DodSection lang={lang} />
          <StyleSection lang={lang} />
          <PromptsSection lang={lang} />
          <CloseSection lang={lang} />
        </main>
      </div>
    </LangCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
