const {useState,useEffect,useRef,createContext,useContext,Fragment}=React;
const LangCtx=createContext({lang:"zh"}); const pick=(obj,lang)=>(obj&&obj[lang]!==undefined?obj[lang]:obj);

function useInView(opts={}){const ref=useRef(null);const [inView,setInView]=useState(false);useEffect(()=>{const el=ref.current;if(!el)return;const ob=new IntersectionObserver(([e])=>{if(e.isIntersecting){setInView(true);ob.disconnect();}}, {threshold:opts.threshold??.18,rootMargin:opts.rootMargin??"0px 0px -10% 0px"});ob.observe(el);return()=>ob.disconnect();},[]);return [ref,inView];}
function Reveal({children,className="",as:As="div",stagger=false,...rest}){const [ref,inView]=useInView();return <As ref={ref} className={(stagger?"reveal-stagger ":"reveal ")+(inView?"in ":"")+className} {...rest}>{children}</As>;}
function useScrollProgress(){useEffect(()=>{const bar=document.getElementById("scroll-progress");const onScroll=()=>{const h=document.documentElement;const scrolled=h.scrollTop/(h.scrollHeight-h.clientHeight);if(bar)bar.style.width=(scrolled*100).toFixed(2)+"%";};onScroll();window.addEventListener("scroll",onScroll,{passive:true});return()=>window.removeEventListener("scroll",onScroll);},[]);}

const Icon={Arrow:({className=""})=><svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,

X:({className=""})=><svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>,
Copy:({className=""})=><svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>,

function LangSwitch({lang,setLang}){const isZh=lang==="zh";return <div className="lang-pill"><span className="slider" style={{transform:isZh?"translateX(0)":"translateX(100%)"}}/><button onClick={()=>setLang("zh")} className={isZh?"active":""}>中文</button><button onClick={()=>setLang("en")} className={!isZh?"active":""}>EN</button></div>;}
function Nav({lang,setLang}){const nav=DICT.nav;const [scrolled,setScrolled]=useState(false);useEffect(()=>{const on=()=>setScrolled(window.scrollY>24);on();window.addEventListener("scroll",on,{passive:true});return()=>window.removeEventListener("scroll",on)},[]);return <header className={"fixed top-0 inset-x-0 z-50 transition-all duration-300 "+(scrolled?"py-2.5 backdrop-blur-md bg-paper/80":"py-4 bg-transparent")} style={{borderBottom:scrolled?"1px solid rgba(14,14,16,.08)":"1px solid transparent"}}><div className="max-w-7xl mx-auto px-5 md:px-8 flex items-center justify-between gap-4"><a href="#top" className="flex items-center gap-3"><div className="brand-mark"></div><div className="flex flex-col leading-tight"><span className="display text-base md:text-[17px] tracking-tight">{pick(DICT.meta.title,lang)}</span><span className="text-[11px] text-dim hidden md:block mono uppercase tracking-widest">{lang==="zh"?"One-Day Hackathon":"单日黑客松"}</span></div></a><nav className="hidden lg:flex items-center gap-1">{nav.sections.map(s=><a key={s.id} href={"#"+s.id} className="px-3 py-1.5 text-sm text-ink/70 hover:text-ink rounded-full transition">{pick(s,lang)}</a>)}</nav><div className="flex items-center gap-3"><LangSwitch lang={lang} setLang={setLang}/><a href="#demo" className="btn btn-ink hidden md:inline-flex">{pick(nav.cta,lang)}<Icon.Arrow className="w-3.5 h-3.5"/></a></div></div></header>;}

function Hero({lang}){const h=DICT.hero;return <section id="top" className="relative pt-32 md:pt-40 pb-20 md:pb-28 overflow-hidden"><div aria-hidden className="pointer-events-none absolute -top-20 -left-20 w-[420px] h-[420px] rounded-full opacity-40" style={{background:"radial-gradient(circle,rgba(124,58,237,.25),transparent 70%)"}}/><div aria-hidden className="pointer-events-none absolute top-10 -right-20 w-[480px] h-[480px] rounded-full opacity-40" style={{background:"radial-gradient(circle,rgba(22,163,74,.22),transparent 70%)"}}/><div className="relative max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="flex items-center gap-3 mb-7"><span className="chip bg-ink text-paper">{pick(h.kicker,lang)}</span><span className="text-[11px] text-dim mono uppercase tracking-widest">SIMPLIFIED SCOPE</span></div></Reveal><Reveal><h1 className="display display-tight display-hero text-[64px] md:text-[88px] leading-[.95] max-w-5xl">{pick(h.title_a,lang)}<br className="hidden md:block"/>{pick(h.title_b,lang)}<span className="serif-it" style={{color:"#16A34A"}}>{pick(h.title_em,lang)}</span>{pick(h.title_c,lang)}</h1></Reveal><Reveal><p className="mt-8 max-w-2xl text-lg md:text-xl leading-[1.55] text-ink/72">{pick(h.lede,lang)}</p></Reveal><Reveal><div className="mt-9 flex flex-wrap items-center gap-3"><a href="#demo" className="btn btn-ink">{pick(h.primary,lang)}<Icon.Arrow className="w-3.5 h-3.5"/></a><a href="#team" className="btn">{pick(h.secondary,lang)}</a></div></Reveal><Reveal stagger className="mt-16 grid grid-cols-2 md:grid-cols-4 gap-px bg-ink/8 border border-ink/8 rounded-2xl overflow-hidden">{h.stats.map((s,i)=><div key={i} className="bg-paper p-6"><div className="display text-4xl md:text-5xl">{pick(s.k,lang)}</div><div className="text-xs mt-1 text-dim uppercase tracking-wider mono">{pick(s.v,lang)}</div></div>)}</Reveal></div><div className="ticker mt-24"><div className="flex marquee-track py-4 whitespace-nowrap">{[...h.tickerItems[lang],...h.tickerItems[lang]].m function DemoSection({lang}){const d=DICT.demo;const [active,setActive]=useState(0);const colorMap={c1:"#2563EB",c2:"#16A34A",c3:"#7C3AED",c4:"#EA580C",c5:"#0D9488"};return <section id="demo" className="py-24 md:py-32 relative"><div className="max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="stamp mb-5">{pick(d.eyebrow,lang)}</div><h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05] tracking-tight">{pick(d.title,lang)}</h2><p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(d.lede,lang)}</p></Reveal><Reveal stagger className="mt-14 grid grid-cols-1 md:grid-cols-5 gap-3">{d.steps.map((s,i)=>{const c=colorMap[s.color],isActive=active===i;return <button key={i} onClick={()=>setActive(i)} className={"text-left p-5 rounded-2xl border transition-all duration-300 "+(isActive?"border-ink/30 bg-white shadow-[0_18px_40px_-22px_rgba(14,14,16,.3)] scale-[1.02]":"border-ink/10 bg-white/50 hover:bg-white hover:border-ink/20")} style={isActive?{boxShadow:`0 0 0 1px ${c},0 18px 40px -22px ${c}55`}:{}}><div className="flex items-center justify-between mb-3"><div className="mono text-xs tracking-widest" style={{color:c}}>{s.num}</div><div className="w-7 h-7 rounded-full flex items-center justify-center" style={{background:isActive?c:"rgba(14,14,16,.06)",color:isActive?"white":"#0E0E10"}}>{isActive?<Icon.Play className="w-3 h-3 ml-0.5"/>:<span className="text-xs mono">{i+1}</span>}</div></div><div className="display text-lg md:text-xl leading-tight">{pick(s.title,lang)}</div><div className="text-sm text-ink/60 mt-2 leading-relaxed">{pick(s.blurb,lang)}</div></button>})}</Reveal><Reveal className="mt-8"><div className="surface p-7 md:p-10"><div className="flex flex-col md:flex-row md:items-start gap-6 md:gap-12"><div className="md:w-1/3"><div className="mono text-xs tracking-widest text-dim mb-2">STEP {d.steps[active].num}</div><div className="display text-3xl md:text-4xl leading-tight">{pick(d.steps[active].title,lang)}</div></div><div className="md:w-2/3 md function MockApp({lang,activeKey,onPick,highlight=[]}){const z=DICT.arch.zones;const get=k=>z.find(x=>x.key===k);const isOn=k=>activeKey===k||highlight.includes(k);const colorFor=k=>get(k).color;const styleFor=k=>({"--zone-c":colorFor(k),"--zone-bg":"rgba(255,255,255,.95)"});const cls=k=>"mock-zone "+(isOn(k)?"active":"");return <div className="mockup"><div className="px-4 py-3 flex items-center gap-1.5 border-b border-ink/8"><div className="flex gap-1.5 mr-3"><div className="w-2.5 h-2.5 rounded-full bg-ink/15"/><div className="w-2.5 h-2.5 rounded-full bg-ink/15"/><div className="w-2.5 h-2.5 rounded-full bg-ink/15"/></div><div className="text-xs mono text-dim mr-4">subtitle.publisher</div>{["import","generate","align","translate","export"].map(k=><span key={k} className="text-xs px-2 py-1 rounded text-ink/70 hover:bg-ink/5">{pick(get(k).title,lang)}</span>)}</div><div className="p-3 grid grid-cols-12 gap-3"><div className={cls("import")+" col-span-12 md:col-span-4 rounded-lg p-3 bg-white"} style={styleFor("import")} onClick={()=>onPick&&onPick("import")}><div className="aspect-video rounded-md relative overflow-hidden" style={{background:"linear-gradient(135deg,#6b7c93 0%,#2c3e50 50%,#1a252f 100%)"}}><div className="absolute inset-0 flex items-center justify-center"><div className="w-10 h-10 rounded-full bg-white/90 flex items-center justify-center shadow-lg"><Icon.Play className="w-4 h-4 ml-0.5 text-ink"/></div></div></div><div className="mt-2 text-[10px] mono text-ink/50">interview.mp4 · 45:12</div></div><div className={cls("generate")+" col-span-12 md:col-span-4 rounded-lg p-3 bg-white"} style={styleFor("generate")} onClick={()=>onPick&&onPick("generate")}><div className="text-xs font-medium mb-2">{pick(get("generate").title,lang)}</div><button className="w-full rounded-md bg-ink text-white text-xs py-2 mb-2">{lang==="zh"?"生成 raw.srt":"Generate raw.srt"}</button>{["00:00:05  We need to act now.","00:00:09  Climate change matters.","00:00:14  This is a global issue."].map((r,i)=><div key={i} className="text-[11px] py-1.5 border-b border-ink/5 last:border-b-0">{r}</div>)}</div><div className={cls("align")+" col-span-12 md:col-span-4 rounded-lg p-3 bg-white"} style={styleFor("align")} onClick={()=>onPick&&onPick("align")}><div className="text-xs font-medium mb-2">{pick(get("align").title,lang)}</div><div className="rounded bg-ink/5 p-2 text-[11px] text-dim mb-2">plain.txt + audio.wav → aligned.srt</div><button className="w-full rounded-md border border-ink/15 text-xs py-2">{lang==="zh"?"对齐 TXT":"Align TXT"}</button></div><div className={cls("translate")+" col-span-12 md:col-span-6 rounded-lg p-3 bg-white"} style={styleFor("translate")} onClick={()=>onPick&&onPick("translate")}><div className="text-xs font-medium mb-2">{pick(get("translate").title,lang)}</div><div className="grid grid-cols-2 gap-2 text-[11px]"><div className="rounded bg-ink/5 p-2">We need to act now.</div><div className="rounded bg-c4/10 p-2">我们需要立即行动。</div></div></div><div className={cls("export")+" col-span-12 md:col-span-6 rounded-lg p-3 bg-white"} style={styleFor("export")} onClick={()=>onPick&&onPick("export")}><div className="text-xs font-medium mb-2">{pick(get("export").title,lang)}</div><div className="grid grid-cols-2 gap-2"><button className="rounded bg-c5 text-white text-xs py-2">{lang==="zh"?"导出 SRT":"Export SRT"}</button><button className="rounded bg-ink text-white text-xs py-2">{lang==="zh"?"上传 YouTube":"Upload YouTube"}</button></div><div className="mt-2 text-[10px] text-dim">translated.srt · title · description</div></div></div></div>;}

function ArchSection({lang,sharedZone,setSharedZone}){const a=DICT.arch;const zones=a.zones;const activeZone=zones.find(z=>z.key===sharedZone)||zones[0];return <section id="arch" className="py-24 md:py-32 bg-cream/40"><div className="max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="stamp mb-5">{pick(a.eyebrow,lang)}</div><h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(a.title,lang)}</h2><p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(a.lede,lang)}</p></Reveal><Reveal className="mt-14 grid grid-cols-1 lg:grid-cols-5 gap-8 items-start"><div className="lg:col-span-3"><MockApp lang={lang} activeKey={sharedZone} onPick={setSharedZone}/></div><div className="lg:col-span-2"><div className="surface p-7 sticky top-24"><div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 rounded-full flex items-center justify-center display font-bold text-white" style={{background:activeZone.color}}>{activeZone.id}</div><div><div className="display text-xl leading-tight">{pick(activeZone.title,lang)}</div><div className="text-xs mono uppercase tracking-widest text-dim">{activeZone.key}</div></div></div><p className="text-ink/75 leading-relaxed">{pick(activeZone.role,lang)}</p><div className="mt-5 flex flex-wrap gap-2">{pick(activeZone.items,lang).map((it,i)=><span key={i} className="chip border border-ink/12 bg-white text-ink/80">{it}</span>)}</div><div className="mt-6 pt-6 border-t border-ink/10"><div className="text-xs mono uppercase tracking-widest text-dim mb-2">{lang==="zh"?"切换区域":"Switch zone"}</div><div className="flex flex-wrap gap-1.5">{zones.map(z=><button key={z.key} onClick={()=>setSharedZone(z.key)} className={"px-2.5 py-1 text-xs rounded-md border transition "+(sharedZone===z.key?"text-white border-transparent":"text-ink/70 border-ink/15 hover:border-ink/30")} style={sharedZone===z.key?{background:z.color}:{}}>{z.id}. {pick(z.title,lang)}</button>)}</div></div></div></div></Reveal><Reveal className="mt-16"><div className="grid grid-cols-1 md:grid-cols-12 gap-8 items-start"><div className="md:col-span-4"><div className="display text-3xl leading-tight">{pick(a.promptTitle,lang)}</div><p className="text-ink/65 mt-3">{pick(a.promptIntro,lang)}</p></div><div className="md:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-3">{a.promptPrinciples.map((p,i)=><div key={i} className="surface-flat p-4 flex items-start gap-3"><div className="mono text-xs text-dim mt-0.5">{String(i+1).padStart(2,"0")}</div><div className="text-sm leading-relaxed text-ink/80">{pick(p,lang)}</div></div>)}</div></div></Reveal></div></section>;}

function TeamSection({lang,sharedZone,setSharedZone}){const tm=DICT.team;const [activeMember,setActiveMember]=useState("ui-a");const member=tm.members.find(m=>m.id===activeMember);useEffect(()=>{if(member&&member.owns.length>0)setSharedZone(member.owns[0]);},[activeMember]);return <section id="team" className="py-24 md:py-32"><div className="max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="stamp mb-5">{pick(tm.eyebrow,lang)}</div><h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(tm.title,lang)}</h2><p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(tm.lede,lang)}</p></Reveal><Reveal className="mt-14 grid grid-cols-1 lg:grid-cols-5 gap-8"><div className="lg:col-span-2 grid grid-cols-2 lg:grid-cols-1 gap-2">{tm.members.map(m=>{const isOn=m.id===activeMember;return <button key={m.id} onClick={()=>setActiveMember(m.id)} className={"flex items-center gap-4 p-4 rounded-2xl border text-left transition "+(isOn?"border-ink/40 bg-white shadow-[0_6px_20px_-12px_rgba(14,14,16,.3)]":"border-ink/10 bg-white/40 hover:bg-white")}><div className="avatar" style={{background:m.color}}>{m.initials}</div><div className="flex-1 min-w-0"><div className="display text-base md:text-lg leading-tight truncate">{pick(m.role,lang)}</div><div className="text-[11px] mono uppercase tracking-widest text-dim mt-0.5">{m.owns.map(o=>DICT.arch.zones.find(z=>z.key===o)?.id).join(" · ")}</div></div></button>})}</div><div className="lg:col-span-3"><MockApp lang={lang} activeKey={null} highlight={member.owns} onPick={(k)=>{const owner=tm.members.find(mm=>mm.owns.includes(k)&&mm.id!=="be"&&mm.id!=="qc");if(owner)setActiveMember(owner.id);}}/><div className="surface mt-5 p-6"><div className="flex items-center gap-3 mb-3"><div className="avatar w-12 h-12 text-sm" style={{background:member.color}}>{member.initials}</div><div><div className="display text-2xl leading-tight">{pick(member.role,lang)}</div><div className="text-xs mono uppercase tracking-widest text-dim">{lang==="zh"?"负责":"Owns"}</div></div></div><div className="flex flex-wrap gap-2 mt-3">{pick(member.duties,lang).map((d,i)=><span key={i} className="chip bg-cream text-ink/85 border border-ink/10">{d}</span>)}</div></div></div></Reveal><Reveal><div className="mt-14 text-center display text-xl md:text-2xl text-ink/70 italic">{pick(tm.footnote,lang)}</div></Reveal></div></section>;}

function FlowSection({lang}){const f=DICT.flow;const [activeId,setActiveId]=useState(1);const [playing,setPlaying]=useState(false);const node=f.nodes.find(n=>n.id===activeId);return <section id="flow" className="py-24 md:py-32 bg-cream/40"><div className="max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="stamp mb-5">{pick(f.eyebrow,lang)}</div><h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(f.title,lang)}</h2><p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(f.lede,lang)}</p></Reveal><Reveal className="mt-14"><div className="relative"><div className="hidden md:block absolute top-[88px] left-[8%] right-[8%] conn-dash"/>{playing&&<div className="hidden md:block absolute top-[82px] left-[8%] right-[8%]"><div className="relative h-3"><div className="packet absolute -top-1 w-3 h-3 rounded-full" style={{background:"#0E0E10",boxShadow:"0 0 0 4px rgba(14,14,16,.1)"}}/></div></div>}<div className="grid grid-cols-2 md:grid-cols-5 gap-3 relative">{f.nodes.map(n=>{const isOn=activeId===n.id;return <button key={n.id} onClick={()=>setActiveId(n.id)} className="text-left"><div className={"relative aspect-square rounded-2xl border-2 transition flex flex-col items-center justify-center p-3 "+(isOn?"bg-white":"bg-white/40 hover:bg-white/80")} style={{borderColor:isOn?n.color:"rgba(14,14,16,.08)"}}><div className="mono text-[10px] tracking-widest mb-1" style={{color:n.color}}>0{n.id}</div><div className="display text-base md:text-lg text-center leading-tight">{pick(n.title,lang)}</div><div className="mono text-[10px] text-dim mt-2 text-center">{n.fmt}</div>{isOn&&<div className="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full" style={{background:n.color}}/>}</div></button>})}</div></div><div className="flex justify-center mt-8"><button onClick={()=>setPlaying(!playing)} className={"btn "+(playing?"btn-ink":"")}>{playing?<><Icon.Pause className="w-3 h-3"/> {pick(f.stopLabel,lang)}</>:<><Icon.Play className="w-3 h-3"/> {pick(f.playLabel,lang)}</>}</button></div><div className="mt-10 surface p-7 md:p-9"><div className="grid md:grid-cols-3 gap-8"><div><div className="mono text-xs tracking-widest text-dim mb-2">{lang==="zh"?"节点":"Node"} 0{node.id}</div><div className="display text-3xl">{pick(node.title,lang)}</div><div className="mono text-sm mt-3 inline-block px-2 py-1 rounded" style={{background:node.color+"15",color:node.color}}>{node.fmt}</div></div><div className="border-t md:border-t-0 md:border-l border-ink/10 pt-6 md:pt-0 md:pl-8"><div className="text-xs mono uppercase tracking-widest text-dim mb-2">IN</div><div className="text-lg display">{pick(node.io.in,lang)}</div></div><div className="border-t md:border-t-0 md:border-l border-ink/10 pt-6 md:pt-0 md:pl-8"><div className="text-xs mono uppercase tracking-widest text-dim mb-2">OUT</div><div className="text-lg display">{pick(node.io.out,lang)}</div></div></div></div></Reveal><Reveal stagger className="mt-14 grid grid-cols-1 md:grid-cols-4 gap-3">{f.principles.map((p,i)=><div key={i} className="surface-flat p-5"><div className="text-2xl mb-2">{p.icon}</div><div className="display text-base mb-1.5">{pick(p.title,lang)}</div><div className="text-sm text-ink/65 leading-relaxed">{pick(p.body,lang)}</div></div>)}</Reveal></div></section>;}

function DodSection({lang}){const d=DICT.dod;const [checked,setChecked]=useState(Array(d.checklist.zh.length).fill(false));const allDone=checked.every(Boolean);const [expanded,setExpanded]=useState(0);const toggle=i=>setChecked(prev=>prev.map((v,j)=>j===i?!v:v));return <section id="dod" className="py-24 md:py-32"><div className="max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="stamp mb-5">{pick(d.eyebrow,lang)}</div><h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(d.title,lang)}</h2><p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(d.lede,lang)}</p></Reveal><Reveal stagger className="mt-14 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">{d.criteria.map((c,i)=>{const isOpen=expanded===i;return <div key={c.id} onMouseEnter={()=>setExpanded(i)} onClick={()=>setExpanded(i)} className={"relative surface-flat p-5 cursor-pointer transition-all duration-300 "+(isOpen?"scale-[1.02]":"")} style={isOpen?{boxShadow:`inset 0 0 0 1.5px ${c.color},0 14px 30px -18px ${c.color}40`}:{}}><div className="flex items-center justify-between mb-3"><div className="w-8 h-8 rounded-full flex items-center justify-center text-white display text-sm font-bold" style={{background:c.color}}>{i+1}</div><div className="text-xl">{c.icon}</div></div><div className="display text-lg leading-tight">{pick(c.title,lang)}</div><ul className="mt-3 space-y-1.5">{pick(c.bullets,lang).map((b,j)=><li key={j} className="text-sm text-ink/70 flex items-start gap-1.5 leading-relaxed"><span className="mt-1.5 w-1 h-1 rounded-full flex-shrink-0" style={{background:c.color}}/><span>{b}</span></li>)}</ul><div className="mt-4 pt-3 border-t border-ink/8"><div className="text-[10px] mono uppercase tracking-widest mb-1" style={{color:c.color}}>{pick(d.exLabel,lang)}</div><div className="text-xs text-ink/70 leading-relaxed">{pick(c.ex,lang)}</div></div></div>})}</Reveal><Reveal className="mt-14 grid grid-cols-1 lg:grid-cols-12 gap-6"><div className="lg:col-span-7 surface p-7"><div className="flex items-center justify-between mb-5"><div className="display text-2xl">{pick(d.checklistTitle,lang)}</div><div className="mono text-sm text-dim">{checked.filter(Boolean).length} / {checked.length}</div></div><div className="grid grid-cols-1 sm:grid-cols-2 gap-3">{pick(d.checklist,lang).map((item,i)=><button key={i} onClick={()=>toggle(i)} className="flex items-start gap-3 p-3 rounded-xl border border-ink/8 hover:border-ink/20 transition text-left"><span className={"tickbox "+(checked[i]?"on":"")}><Icon.Check/></span><span className={"text-sm leading-relaxed transition "+(checked[i]?"line-through text-dim":"text-ink/85")}>{item}</span></button>)}</div>{allDone&&<div className="mt-5 p-4 rounded-xl flex items-center gap-3 bg-c2/10 text-c2"><Icon.Check className="w-5 h-5"/><span className="display text-base">{pick(d.cheer,lang)}</span></div>}</div><div className="lg:col-span-5 p-7 rounded-2xl border" style={{background:"rgba(220,38,38,.04)",borderColor:"rgba(220,38,38,.2)"}}><div className="flex items-center gap-2 mb-3"><div className="w-7 h-7 rounded-full bg-warn text-white flex items-center justify-center" style={{background:"#DC2626"}}>!</div><div className="display text-xl" style={{color:"#DC2626"}}>{pick(d.warnTitle,lang)}</div></div><p className="text-ink/70 text-sm leading-relaxed">{pick(d.warnBody,lang)}</p><div className="mt-6 flex items-center gap-3 text-sm"><div className="flex-1 p-3 rounded-lg bg-white border border-ink/10"><div className="flex items-center gap-2"><Icon.X className="w-4 h-4" style={{color:"#DC2626"}}/><div className="text-xs" style={{color:"#DC2626"}}>{pick(d.pathBad,lang)}</div></div></div><Icon.Arrow className="w-4 h-3 text-dim flex-shrink-0"/><div className="flex-1 p-3 rounded-lg bg-white border border-ink/10"><div className="flex items-center gap-2"><Icon.Check className="w-4 h-4" style={{color:"#16A34A"}}/><div className="text-xs" style={{color:"#16A34A"}}>{pick(d.pathGood,lang)}</div></div></div></div></div></Reveal></div></section>;}

function PromptsSection({lang}){const p=DICT.prompts;const [tab,setTab]=useState(0);const [copied,setCopied]=useState(false);const cur=p.tabs[tab];const copySample=()=>{const text=cur.sample[lang].join("\n");navigator.clipboard?.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1800);});};return <section id="prompts" className="py-24 md:py-32 bg-cream/40"><div className="max-w-7xl mx-auto px-5 md:px-8"><Reveal><div className="stamp mb-5">{pick(p.eyebrow,lang)}</div><h2 className="display text-4xl md:text-6xl max-w-4xl leading-[1.05]">{pick(p.title,lang)}</h2><p className="text-ink/65 mt-6 max-w-2xl text-lg">{pick(p.lede,lang)}</p></Reveal><Reveal className="mt-12"><div className="tab-row max-w-xl">{p.tabs.map((t,i)=><button key={t.key} className={tab===i?"active":""} onClick={()=>{setTab(i);setCopied(false)}} style={tab===i?{color:t.color}:{}}><span className="mono text-[10px] tracking-widest opacity-60 mr-1.5">0{i+1}</span>{pick(t.label,lang)}</button>)}</div></Reveal><Reveal className="mt-8 grid grid-cols-1 lg:grid-cols-12 gap-6"><div className="lg:col-span-5"><div className="surface p-7"><div className="display text-2xl mb-2 leading-tight" style={{color:cur.color}}>{pick(cur.label,lang)}</div><p className="text-ink/75 leading-relaxed">{pick(cur.intent,lang)}</p><div className="mt-7"><div className="mono text-[10px] uppercase tracking-widest text-dim mb-3">{lang==="zh"?"流程":"Flow"}</div><div className="space-y-2">{cur.flow.map((f,i)=><Fragment key={i}><div className="flex items-center gap-3 p-3 rounded-xl border" style={{background:cur.color+"08",borderColor:cur.color+"30"}}><div className="w-6 h-6 rounded-full flex items-center justify-center text-white display text-xs" style={{background:cur.color}}>{i+1}</div><div className="text-sm font-medium">{pick(f,lang)}</div></div>{i<cur.flow.length-1&&<div className="flex justify-center"><Icon.Arrow className="w-3.5 h-2.5 text-dim" style={{transform:"rotate(90deg)"}}/></div>}</Fragment>)}</div></div><div className="mt-7 pt-5 border-t border-ink/8"><div className="mono text-[10px] uppercase tracking-widest text-dim mb-1">{pick(p.goalLabel,lang)}</div><div className="text-sm text-ink/80 leading-relaxed">{pick(cur.goal,lang)}</div></div></div></div><div className="lg:col-span-7"><div className="prompt-box relative"><div className="flex items-center justify-between mb-4"><div className="flex gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-white/15"/><div className="w-2.5 h-2.5 rounded-full bg-white/15"/><div className="w-2.5 h-2.5 rounded-full bg-white/15"/></div><div className="mono text-[10px] tracking-widest text-white/40 uppercase">prompt · {cur.key}</div><button onClick={copySample} className="flex items-center gap-1.5 text-xs px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-white transition">{copied?<Icon.Check className="w-3 h-3"/>:<Icon.Copy className="w-3 h-3"/>}{copied?pick(p.copied,lang):pick(p.copy,lang)}</button></div><pre className="whitespace-pre-wrap text-[13px] leading-[1.75] font-mono">{cur.sample[lang].map((line,i)=>{let cls="";if(/^\d+\./.test(line.trim())||line.trim().startsWith("-"))cls="num";else if(line.trim().endsWith(":"))cls="kw";else if(line.includes("【")||line.includes("raw.srt")||line.includes("aligned.srt")||line.includes("translated.srt"))cls="accent";return <div key={i} className={cls}>{line||"\u00A0"}</div>})}</pre></div></div></Reveal><Reveal className="mt-16"><div className="display text-2xl mb-5">{pick(p.principlesTitle,lang)}</div><div className="grid grid-cols-1 md:grid-cols-4 gap-3">{p.principles.map((pr,i)=><div key={i} className="surface-flat p-5"><div className="mono text-xs tracking-widest text-dim mb-2">0{i+1}</div><div className="display text-lg mb-1">{pick(pr.title,lang)}</div><div className="text-sm text-ink/65 leading-relaxed">{pick(pr.body,lang)}</div></div>)}</div></Reveal></div></section>;}

function CloseSection({lang}){const c=DICT.close;return <section className="py-28 md:py-40 relative overflow-hidden border-t border-ink/10" style={{background:"#0E0E10",color:"#FAF8F2"}}><div className="relative max-w-5xl mx-auto px-5 md:px-8 text-center"><Reveal><div className="mono text-xs uppercase tracking-widest text-white/50 mb-7">{pick(c.eyebrow,lang)}</div></Reveal><Reveal><h2 className="display text-4xl md:text-6xl leading-[1.05] max-w-4xl mx-auto">{pick(c.title,lang)}</h2></Reveal><Reveal><p className="mt-7 text-lg md:text-xl text-white/65 max-w-2xl mx-auto leading-relaxed">{pick(c.body,lang)}</p></Reveal><Reveal><div className="mt-12 flex items-center justify-center gap-3"><a href="#top" className="btn" style={{background:"white",color:"#0E0E10",borderColor:"white"}}>↑ {pick(c.back,lang)}</a></div></Reveal><Reveal><div className="mt-20 pt-8 border-t border-white/10 text-xs mono uppercase tracking-widest text-white/40">{pick(c.sign,lang)} · 2026</div></Reveal></div></section>;}

function App(){const [lang,setLang]=useState("zh");const [sharedZone,setSharedZone]=useState("import");useScrollProgress();useEffect(()=>{document.documentElement.lang=lang==="zh"?"zh-CN":"en";document.body.classList.toggle("lang-zh",lang==="zh");document.body.classList.toggle("lang-en",lang==="en");},[lang]);return <LangCtx.Provider value={{lang}}><div className="relative"><Nav lang={lang} setLang={setLang}/><main><Hero lang={lang}/><DemoSection lang={lang}/><ArchSection lang={lang} sharedZone={sharedZone} setSharedZone={setSharedZone}/><TeamSection lang={lang} sharedZone={sharedZone} setSharedZone={setSharedZone}/><FlowSection lang={lang}/><DodSection lang={lang}/><PromptsSection lang={lang}/><CloseSection lang={lang}/></main></div></LangCtx.Provider>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
